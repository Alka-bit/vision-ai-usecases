    { cat:"misc", title:"Item Detection & Digital Twin", company:"NVIDIA", industry:"Manufacturing", capabilities:["Digital Twin"], problem:"Floor activity isn't reflected anywhere outside the floor itself.", solution:"Detections feed a live digital twin of the production process.", value:["Reduced Manual Inspection"], yt:"2UIx3sx0a68", drive:"1bztEeo2bCrVMybFHKR6-GQ8CMxsOK1uK" }
  ];
 
  /* ---------------- Build category sections + card markup ---------------- */
  var root = document.getElementById("categoriesRoot");
  var allIndustries = [];
  var allCapabilities = [];
 
  CASES.forEach(function (c) {
    if (allIndustries.indexOf(c.industry) === -1) allIndustries.push(c.industry);
    c.capabilities.forEach(function (cap) {
      if (allCapabilities.indexOf(cap) === -1) allCapabilities.push(cap);
    });
  });
  allIndustries.sort();
  allCapabilities.sort();
 
  function fillFilterGroup(containerId, type, values) {
    var container = document.getElementById(containerId);
    values.forEach(function (v) {
      var btn = document.createElement("button");
      btn.className = "pill";
      btn.setAttribute("data-filter-type", type);
      btn.setAttribute("data-value", v);
      btn.textContent = v;
      container.appendChild(btn);
    });
  }
  fillFilterGroup("industryFilters", "industry", allIndustries);
  fillFilterGroup("capabilityFilters", "capability", allCapabilities);
 
  function cardMarkup(c, idx) {
    var badges = '<span class="badge industry">' + c.industry + '</span>' +
      c.capabilities.map(function (cap) { return '<span class="badge">' + cap + '</span>'; }).join("");
    var valueItems = c.value.map(function (v) {
      return '<div class="value-item">' + CHECK_ICON + '<span>' + v + '</span></div>';
    }).join("");
    var companyLine = c.company ? c.company : "";
    var searchTerms = (c.title + " " + companyLine + " " + c.industry + " " + c.capabilities.join(" ")).toLowerCase();
 
    return (
      '<article class="card" data-cat="' + c.cat + '" data-industry="' + c.industry + '" data-capabilities="' + c.capabilities.join("|") + '" data-search="' + searchTerms + '">' +
        '<div class="card-video" data-yt="' + c.yt + '">' +
          '<img class="poster" loading="lazy" alt="" src="https://img.youtube.com/vi/' + c.yt + '/hqdefault.jpg">' +
        '</div>' +
        '<div class="card-body">' +
          '<div class="card-badges">' + badges + '</div>' +
          '<h3 class="card-title">' + c.title + '</h3>' +
          '<div class="card-field"><span class="label">Business Problem</span><p>' + c.problem + '</p></div>' +
          '<div class="card-field"><span class="label">Solution</span><p>' + c.solution + '</p></div>' +
          '<div class="value-list">' + valueItems + '</div>' +
        '</div>' +
      '</article>'
    );
  }
 
  CATEGORIES.forEach(function (cat) {
    var items = CASES.filter(function (c) { return c.cat === cat.id; });
    var section = document.createElement("section");
    section.className = "category";
    section.id = cat.id;
 
    section.innerHTML =
      '<div class="cat-head">' +
        '<div class="cat-head-top">' +
          '<span class="cat-icon">' + ICONS[cat.icon] + '</span>' +
          '<h2 class="cat-title">' + cat.title + '</h2>' +
        '</div>' +
        '<div class="cat-copy">' +
          '<div class="cat-copy-block"><span class="label">The Problem</span><p>' + cat.problem + '</p></div>' +
          '<div class="cat-copy-block"><span class="label">The Outcome</span><p>' + cat.outcome + '</p></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-grid" data-grid="' + cat.id + '">' +
        items.map(cardMarkup).join("") +
      '</div>';
 
    root.appendChild(section);
    var divider = document.createElement("div");
    divider.className = "section-divider";
    root.appendChild(divider);
  });
 
  /* ---------------- Sticky nav: scroll + active highlighting ---------------- */
  var navButtons = Array.prototype.slice.call(document.querySelectorAll(".cat-nav-btn"));
  navButtons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      var target = document.getElementById(btn.getAttribute("data-target"));
      if (!target) return;
      var navHeight = document.querySelector(".cat-nav").offsetHeight;
      var y = target.getBoundingClientRect().top + window.pageYOffset - navHeight - 8;
      window.scrollTo({ top: y, behavior: "smooth" });
    });
  });
 
  var sectionEls = Array.prototype.slice.call(document.querySelectorAll("section.category"));
  var navObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        navButtons.forEach(function (b) {
          b.classList.toggle("active", b.getAttribute("data-target") === entry.target.id);
        });
      }
    });
  }, { rootMargin: "-45% 0px -45% 0px", threshold: 0 });
  sectionEls.forEach(function (s) { navObserver.observe(s); });
 
  /* ---------------- Section reveal on scroll ---------------- */
  var revealObserver = new IntersectionObserver(function (entries, obs) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add("in-view");
        obs.unobserve(entry.target);
      }
    });
  }, { threshold: 0.05 });
  sectionEls.forEach(function (s) { revealObserver.observe(s); });
 
  /* ---------------- Card stagger-in ---------------- */
  var cardObserver = new IntersectionObserver(function (entries, obs) {
    entries.forEach(function (entry) {
      if (entry.isIntersecting) {
        var el = entry.target;
        var siblings = Array.prototype.slice.call(el.parentElement.children);
        var i = siblings.indexOf(el);
        el.style.transitionDelay = Math.min(i % 3, 2) * 70 + "ms";
        el.classList.add("card-visible");
        obs.unobserve(el);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll(".card").forEach(function (c) { cardObserver.observe(c); });
 
  /* ---------------- Lazy-load + viewport autoplay/pause for video cards ---------------- */
  function ytSrc(id) {
    return "https://www.youtube.com/embed/" + id +
      "?enablejsapi=1&mute=1&playsinline=1&controls=0&rel=0&modestbranding=1&loop=1&playlist=" + id;
  }
  function postToPlayer(iframe, func) {
    if (!iframe || !iframe.contentWindow) return;
    iframe.contentWindow.postMessage(JSON.stringify({ event: "command", func: func, args: [] }), "*");
  }
 
  var lazyObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      var box = entry.target;
      if (entry.isIntersecting && !box.dataset.loaded) {
        var iframe = document.createElement("iframe");
        iframe.setAttribute("allow", "autoplay; encrypted-media");
        iframe.setAttribute("loading", "lazy");
        iframe.src = ytSrc(box.getAttribute("data-yt"));
        iframe.addEventListener("load", function () { iframe.classList.add("loaded"); });
        box.appendChild(iframe);
        box.dataset.loaded = "1";
        lazyObserver.unobserve(box);
        playObserver.observe(box);
      }
    });
  }, { rootMargin: "300px 0px" });
  document.querySelectorAll(".card-video").forEach(function (b) { lazyObserver.observe(b); });
 
  var playObserver = new IntersectionObserver(function (entries) {
    entries.forEach(function (entry) {
      var box = entry.target;
      var iframe = box.querySelector("iframe");
      if (!iframe) return;
      if (entry.isIntersecting && entry.intersectionRatio >= 0.5) {
        postToPlayer(iframe, "playVideo");
        box.classList.add("playing");
      } else {
        postToPlayer(iframe, "pauseVideo");
        box.classList.remove("playing");
      }
    });
  }, { threshold: [0, 0.5, 1] });
 
  /* ---------------- Animated stat counters ---------------- */
  var statEls = document.querySelectorAll(".stat-num");
  var statsObserver = new IntersectionObserver(function (entries, obs) {
    entries.forEach(function (entry) {
      if (!entry.isIntersecting) return;
      var el = entry.target;
      var target = parseInt(el.getAttribute("data-count"), 10);
      var suffix = el.getAttribute("data-suffix") || "";
      var start = null;
      var duration = 1100;
      function step(ts) {
        if (!start) start = ts;
        var progress = Math.min((ts - start) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3);
        el.textContent = Math.round(eased * target) + suffix;
        if (progress < 1) requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      obs.unobserve(el);
    });
  }, { threshold: 0.6 });
  statEls.forEach(function (el) { statsObserver.observe(el); });
 
  /* ---------------- Filters: search + industry + capability ---------------- */
  var state = { search: "", industry: "all", capability: "all" };
  var searchInput = document.getElementById("searchInput");
  var resultsNote = document.getElementById("resultsNote");
  var allPills = document.querySelectorAll(".pill");
 
  allPills.forEach(function (pill) {
    pill.addEventListener("click", function () {
      var type = pill.getAttribute("data-filter-type");
      var value = pill.getAttribute("data-value");
      document.querySelectorAll('.pill[data-filter-type="' + type + '"]').forEach(function (p) {
        p.classList.remove("active");
      });
      pill.classList.add("active");
      state[type] = value;
      applyFilters();
    });
  });
 
  searchInput.addEventListener("input", function () {
    state.search = searchInput.value.trim().toLowerCase();
    applyFilters();
  });
 
  function applyFilters() {
    var visibleCount = 0;
    CATEGORIES.forEach(function (cat) {
      var grid = document.querySelector('.card-grid[data-grid="' + cat.id + '"]');
      var section = document.getElementById(cat.id);
      var cards = grid.querySelectorAll(".card");
      var visibleInSection = 0;
 
      cards.forEach(function (card) {
        var matchesIndustry = state.industry === "all" || card.getAttribute("data-industry") === state.industry;
        var matchesCapability = state.capability === "all" || card.getAttribute("data-capabilities").split("|").indexOf(state.capability) !== -1;
        var matchesSearch = state.search === "" || card.getAttribute("data-search").indexOf(state.search) !== -1;
        var show = matchesIndustry && matchesCapability && matchesSearch;
        card.style.display = show ? "" : "none";
        if (show) { visibleInSection++; visibleCount++; }
      });
 
      var existingEmpty = grid.querySelector(".card-empty");
      if (visibleInSection === 0) {
        section.style.display = "none";
      } else {
        section.style.display = "";
        if (existingEmpty) existingEmpty.remove();
      }
    });
 
    resultsNote.textContent = visibleCount === CASES.length
      ? ""
      : visibleCount + " of " + CASES.length + " use cases match your filters";
  }
})();
</script>
